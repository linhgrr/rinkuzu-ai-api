name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip "setuptools<82"
      - run: pip install -e .[dev]
      - run: python -m pip check

  precommit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip "setuptools<82"
      - run: pip install -e .[dev]
      - run: python -m pre_commit run --all-files --show-diff-on-failure

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check api/ tests/ scripts/"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check api/ tests/ scripts/"

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip "setuptools<82"
      - run: pip install -e .[dev]
      - run: python -m mypy api/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip "setuptools<82"
      - run: pip install -e .[dev]
      - run: >
          python -m pytest tests/ -q
          --ignore=tests/core/test_exercise_service.py
          --ignore=tests/core/test_exercise_types.py
          --cov=api
          --cov-report=term-missing
          --cov-fail-under=40

  perf-advisory:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip "setuptools<82"
      - run: pip install -e .[dev]
      - run: bash scripts/perf-be.sh
      - uses: actions/upload-artifact@v4
        with:
          name: perf-be
          path: |
            perf/be-*.json
            perf/be-load*
          if-no-files-found: warn

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip "setuptools<82"
      - run: pip install -e .[dev]
      - run: python -m bandit -q -r api -x tests -lll
      # CVE-2026-45829 affects the ChromaDB HTTP server path in 1.x and has no
      # patched release yet. This API embeds ChromaDB in-process and does not
      # expose the vulnerable Chroma server endpoint; remove this ignore once a
      # fixed ChromaDB release is available.
      - run: python -m pip_audit --progress-spinner off --ignore-vuln CVE-2026-45829
