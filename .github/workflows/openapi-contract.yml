name: OpenAPI Contract

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  UV_VERSION: "0.11.29"
  # Assert uv.lock is up-to-date and install only from that lock (official uv CI pattern).
  UV_LOCKED: "1"

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          python-version: "3.11"

      - name: Frozen sync (dev)
        run: uv sync --locked --extra dev

      - name: Export OpenAPI schema
        run: uv run python scripts/export_openapi.py --output openapi.json

      - name: Lint OpenAPI schema
        run: npx @redocly/cli lint openapi.json --extends minimal
