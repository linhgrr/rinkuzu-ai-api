[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rinkuzu-ai-api"
version = "1.0.0"
description = "FastAPI backend for Rinkuzu adaptive learning and content pipeline services."
readme = "README.md"
requires-python = ">=3.11,<3.14"
dependencies = [
    "langsmith",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q"

# ── Ruff ──────────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py311"
line-length = 100
src = ["api", "tests"]

[tool.ruff.lint]
# Start from ALL, then explicitly opt-out of rules that are impractical
# without full annotation/docstring rewrites or that conflict with the formatter.
select = ["ALL"]
ignore = [
    # ── Formatter conflicts ────────────────────────────────
    "COM812",   # trailing comma — formatter handles this
    "ISC001",   # implicit string concat on one line — formatter handles

    # ── Annotation & docstring rules (require full rewrite) ─
    "ANN",      # type annotations everywhere — covered incrementally by mypy
    "D",        # docstrings — too many missing; tracked separately

    # ── Noise / impractical for this codebase ─────────────
    "E501",     # line too long — formatter enforces line-length already
    "B008",     # Depends() in defaults — idiomatic FastAPI pattern
    "FIX",      # FIXME markers — too noisy during active development
    "TD",       # TODO directives — same
    "CPY",      # copyright notices — not required
    "PD",       # pandas-specific — not used in this project

    # ── Exception message style (existing conventions) ─────
    "EM101",    # string literal in exception — acceptable with loguru pattern
    "EM102",    # f-string in exception
    "TRY003",   # long exception messages — fine for domain exceptions

    # ── FastAPI dependency injection ───────────────────────
    "PLR0913",  # too-many-arguments — FastAPI routes inject many deps via Depends()
    "FAST002",  # FastAPI non-annotated dependency — Depends() is typed via generics

    # ── Private member access (session lock) ───────────────
    "SLF001",   # _private access — async session._lock is intentional encapsulation

    # ── Intra-package relative imports ─────────────────────
    "TID252",   # relative imports from parent — standard Python package convention

    # ── Broad exception catch at service boundaries ────────
    # BLE001 is suppressed ONLY for code paths that function as top-level failure
    # boundaries, where the intent is to persist/log ANY error from external
    # libraries (LangChain, ChromaDB, Motor, PyTorch) before it surfaces.
    # All other exception handling uses specific types.
    "BLE001",

    # ── Checked per-file below ─────────────────────────────
    "S101",     # assert — allowed in tests (see per-file-ignores)
    "S105",     # hardcoded password — allowed in tests
    "S106",     # hardcoded password in function call — allowed in tests
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",     # asserts are idiomatic in pytest
    "S105",     # dummy passwords in fixtures are fine
    "S106",
    "ARG001",   # unused function args (fixtures often unused in body)
    "ARG002",
    "PLR2004",  # magic values OK in test assertions
]
"api/main.py" = [
    "E402",     # module-level import not at top (os import inside lifespan)
]

[tool.ruff.lint.isort]
known-first-party = ["api"]
force-sort-within-sections = true

[tool.ruff.lint.pylint]
max-args = 10           # FastAPI routes can have many injected deps
max-returns = 8

[tool.ruff.lint.mccabe]
max-complexity = 12     # pipeline stages are inherently complex

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false

# ── Mypy ──────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.11"
strict_optional = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = true
disallow_untyped_defs = false   # ratchet up incrementally
files = ["api"]
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = [
    "motor.*",
    "chromadb.*",
    "underthesea.*",
    "pyvi.*",
    "agentic_doc.*",
    "sentence_transformers.*",
    "gymnasium.*",
    "stable_baselines3.*",
    "trustcall.*",
    "aiofiles.*",
    "loguru.*",
    "pymupdf.*",
    "boto3.*",
    "botocore.*",
]
ignore_missing_imports = true
